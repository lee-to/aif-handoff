services:
  api:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: api
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    ports:
      - "${PORT:-3009}:3009"
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - PORT=3009
      - AIF_ENABLE_CODEX_LOGIN_PROXY=true
      - AGENT_INTERNAL_URL=http://agent:3010
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: web
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    ports:
      - "${WEB_PORT:-5180}:80"
    depends_on:
      - api
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: agent
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - API_BASE_URL=http://api:3009
      - AGENT_BYPASS_PERMISSIONS=true
      - AIF_ENABLE_CODEX_LOGIN_PROXY=true
      - AIF_CODEX_LOGIN_BROKER_PORT=3010
      - AGENT_INTERNAL_URL=http://agent:3010
    expose:
      - "3010"
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
      - claude-auth:/home/node/.claude
      - codex-auth:/home/node/.codex
    depends_on:
      - api
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: mcp
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    ports:
      - "${MCP_PORT:-3100}:3100"
    env_file: .env
    environment:
      - DATABASE_URL=/data/aif.sqlite
      - MCP_TRANSPORT=http
      - MCP_PORT=3100
    volumes:
      - db-data:/data
      - ${PROJECTS_DIR:-./projects}:${PROJECTS_MOUNT:-/home/www}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
  claude-auth:
  codex-auth:
